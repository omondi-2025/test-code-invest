<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="api.js"></script>
  <script>VillaAuth.guard();</script>
  <style>
    .hero-card {
      background: linear-gradient(135deg, var(--primary) 0%, #2d5282 100%);
      color: #fff;
      border-radius: 18px;
      padding: 1.4rem 1.2rem;
      margin: 0.8rem 1rem;
    }
    .hero-card .greeting { font-size: 1rem; opacity: 0.85; margin-bottom: 0.15rem; }
    .hero-card .name     { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.6rem; }
    .hero-card .balance-label { font-size: 0.8rem; opacity: 0.7; margin: 0; }
    .hero-card .balance-amount { font-size: 2rem; font-weight: 800; margin: 0.1rem 0 0; }

    .wa-btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: #25D366; color: #fff;
      border: none; border-radius: 10px;
      padding: 0.55rem 1rem; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; margin: 0 1rem 0.5rem;
    }
    .wa-menu {
      display: none; position: absolute;
      background: #fff; min-width: 240px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border-radius: 12px; z-index: 999;
      padding: 0.6rem;
    }
    .wa-menu a {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.8rem; border-radius: 8px;
      text-decoration: none; color: var(--text);
      font-size: 0.875rem; font-weight: 600;
    }
    .wa-menu a:hover { background: #F1F5F9; }
    .wa-dropdown { position: relative; display: inline-block; }
  </style>
</head>
<body>

  <header class="site-header">
    <span class="brand">VILLA <span style="color:#fff">CASH</span></span>
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <div class="wa-dropdown" id="waDropdown">
        <button class="wa-btn" onclick="toggleWAMenu()">
          <i class="fa-brands fa-whatsapp"></i> Chat
        </button>
        <div class="wa-menu" id="waMenu">
          <a href="https://chat.whatsapp.com/DJO9NGcMiJdCLwGkTg3JpV?mode=ac_t" target="_blank">
            <i class="fa-brands fa-whatsapp" style="color:#25D366"></i> Join WhatsApp Group
          </a>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </header>

  <div class="hero-card">
    <p class="greeting" id="greetingText">Hello,</p>
    <p class="name" id="userName">Investor</p>
    <p class="balance-label">Wallet Balance</p>
    <p class="balance-amount">KES <span id="userWallet">0.00</span></p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <i class="fa-solid fa-wallet" style="color:var(--purple);font-size:1.1rem"></i>
      <div style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">Balance</div>
      <strong>KES <span id="balanceStat">0.00</span></strong>
    </div>
    <div class="stat-card">
      <i class="fa-solid fa-money-bill-wave" style="color:var(--success);font-size:1.1rem"></i>
      <div style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">Cashouts</div>
      <strong>KES <span id="cashouts">0.00</span></strong>
    </div>
    <div class="stat-card">
      <i class="fa-solid fa-arrow-trend-up" style="color:var(--secondary);font-size:1.1rem"></i>
      <div style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">Invested</div>
      <strong>KES <span id="expenses">0.00</span></strong>
    </div>
    <div class="stat-card">
      <i class="fa-solid fa-coins" style="color:#10B981;font-size:1.1rem"></i>
      <div style="margin-top:0.3rem;font-size:0.8rem;color:var(--muted)">Daily Income</div>
      <strong>KES <span id="dailyIncome">0.00</span></strong>
    </div>
  </div>

  <p class="section-title">Quick Actions</p>
  <div class="action-center">
    <a href="deposit.html">
      <i class="fa-solid fa-circle-down"></i>
      Deposit
    </a>
    <a href="withdrawal.html">
      <i class="fa-solid fa-circle-up"></i>
      Withdraw
    </a>
    <a href="invest.html">
      <i class="fa-solid fa-chart-line"></i>
      Invest
    </a>
    <a href="history.html">
      <i class="fa-solid fa-clock-rotate-left"></i>
      History
    </a>
    <a href="agent.html">
      <i class="fa-solid fa-user-plus"></i>
      Invite
    </a>
    <a href="profile.html">
      <i class="fa-solid fa-circle-user"></i>
      Profile
    </a>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    if (!VillaAuth.requireLogin()) return;

    try {
      const res  = await VillaAuth.fetch("/api/user/me");
      const data = await res.json();
      if (data.success && data.user) {
        const u = data.user;

        const hour = new Date().getHours();
        const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";

        document.getElementById("greetingText").textContent = greeting + ",";
        document.getElementById("userName").textContent     = u.fullName;
        document.getElementById("userWallet").textContent   = parseFloat(u.wallet || 0).toFixed(2);
        document.getElementById("balanceStat").textContent  = parseFloat(u.wallet || 0).toFixed(2);
        document.getElementById("cashouts").textContent     = parseFloat(u.cashouts || 0).toFixed(2);
        document.getElementById("expenses").textContent     = parseFloat(u.expenses || 0).toFixed(2);
        document.getElementById("dailyIncome").textContent  = parseFloat(u.dailyIncome || 0).toFixed(2);

        // Keep the cached user fresh, in the same storage the user chose
        VillaAuth.updateUser({
          id: u._id, fullName: u.fullName, email: u.email, phone: u.phone,
          wallet: u.wallet, refCode: u.refCode, cashouts: u.cashouts,
          expenses: u.expenses, dailyIncome: u.dailyIncome, role: u.role
        });
      }
    } catch (err) { console.error("Failed to fetch user data:", err); }
  });

  function logout() {
    VillaAuth.logout();
  }

  function toggleWAMenu() {
    const menu = document.getElementById("waMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  document.addEventListener("click", (e) => {
    const dd = document.getElementById("waDropdown");
    if (dd && !dd.contains(e.target)) document.getElementById("waMenu").style.display = "none";
  });
  </script>
</body>
</html>
