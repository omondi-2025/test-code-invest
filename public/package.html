<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Packages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="api.js?v=8"></script>
  <script>VillaAuth.guard();</script>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">Packages</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:1rem;">
    <p class="section-title">Investment Packages</p>
    <div class="plans-container" id="packagesList"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script>
    (function() {

      const packages = [
        { id: 1, amount: 400,   profit: "10%", duration: "100 days" },
        { id: 2, amount: 800,   profit: "10%", duration: "100 days" },
        { id: 3, amount: 1800,  profit: "10%", duration: "100 days" },
        { id: 4, amount: 2800,  profit: "10%", duration: "100 days" },
        { id: 5, amount: 3500,  profit: "10%", duration: "100 days" },
        { id: 6, amount: 5000,  profit: "10%", duration: "100 days" },
        { id: 7, amount: 8500,  profit: "10%", duration: "100 days" },
        { id: 8, amount: 15000, profit: "10%", duration: "100 days" },
        { id: 9, amount: 30000, profit: "10%", duration: "100 days" },
      ];

      document.getElementById("packagesList").innerHTML = packages.map(p => `
        <div class="plan-card">
          <div style="font-size:1.1rem;font-weight:800;color:var(--primary)">KES ${p.amount.toLocaleString()}</div>
          <div style="font-size:0.8rem;color:var(--muted);margin:0.3rem 0">${p.profit} profit &bull; ${p.duration}</div>
          <div style="font-size:0.85rem;color:var(--success);font-weight:700;margin-bottom:0.6rem">
            <i class="fa-solid fa-coins"></i> Daily: KES ${(p.amount * 0.10).toFixed(2)}
          </div>
          <button class="btn btn-primary" style="width:100%;padding:0.55rem"
            onclick="window.location.href='invest.html#plan${p.id}'">
            <i class="fa-solid fa-chart-line"></i> Invest Now
          </button>
        </div>
      `).join("");
    })();
  </script>
</body>
</html>
