<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | History</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="api.js?v=8"></script>
  <script>VillaAuth.guard();</script>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">History</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:1rem;">

    <div class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
        <thead>
          <tr style="background:var(--primary);color:#fff;">
            <th style="padding:0.75rem 0.6rem;text-align:left">Type</th>
            <th style="padding:0.75rem 0.6rem;text-align:left">Amount</th>
            <th style="padding:0.75rem 0.6rem;text-align:left">Status</th>
            <th style="padding:0.75rem 0.6rem;text-align:left">Date &amp; Time</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="4" style="text-align:center;padding:1.2rem;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html" class="active"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script>
    async function loadHistory() {
      const tbody = document.getElementById("historyBody");
      try {
        const [wRes, dRes] = await Promise.all([
          VillaAuth.fetch("/api/withdraw"),
          VillaAuth.fetch("/api/deposit")
        ]);
        const [wData, dData] = await Promise.all([wRes.json(), dRes.json()]);

        const withdrawals = (wData.success && wData.history)
          ? wData.history.map(i => ({ type: "Withdrawal", amount: i.amount, status: i.status, date: i.date }))
          : [];
        const deposits = (dData.success && dData.deposits)
          ? dData.deposits.map(i => ({ type: "Deposit", amount: i.amount, status: i.status || "completed", date: i.date }))
          : [];

        const combined = [...withdrawals, ...deposits].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (!combined.length) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:1.2rem;color:var(--muted)">No transactions yet.</td></tr>';
          return;
        }

        tbody.innerHTML = combined.map(e => {
          const color = e.status === "approved" || e.status === "completed"
            ? "var(--success)" : e.status === "pending" ? "var(--secondary)" : "var(--danger)";
          const icon  = e.type === "Deposit"
            ? '<i class="fa-solid fa-circle-down" style="color:var(--success)"></i>'
            : '<i class="fa-solid fa-circle-up" style="color:var(--primary)"></i>';
          return '<tr style="border-bottom:1px solid var(--border)">' +
            '<td style="padding:0.65rem 0.6rem">' + icon + ' ' + e.type + '</td>' +
            '<td style="padding:0.65rem 0.6rem">KES ' + (e.amount || 0).toFixed(2) + '</td>' +
            '<td style="padding:0.65rem 0.6rem;color:' + color + ';font-weight:700">' + e.status + '</td>' +
            '<td style="padding:0.65rem 0.6rem">' + VillaAuth.fmtDate(e.date) + '</td>' +
          '</tr>';
        }).join("");
      } catch {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:1rem;color:var(--danger)">Failed to load history.</td></tr>';
      }
    }

    loadHistory();
  </script>
</body>
</html>
