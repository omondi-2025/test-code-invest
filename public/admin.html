<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Villa Cash | Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="admin-login-wrapper">
  <div class="admin-login-card">
    <div class="brand-logo">
      <i class="fa-solid fa-building-columns"></i>
      <span>VILLA CASH</span>
    </div>
    <h2>Admin Portal &mdash; Sign In</h2>

    <div class="field">
      <label for="adminUser">Username</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="adminUser" placeholder="Enter username" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="adminPass">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="adminPass" placeholder="Enter password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()">
          <i id="pwEye" class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>

    <p class="error-msg" id="loginError"></p>
    <button class="btn btn-primary btn-block" id="loginBtn" onclick="adminLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" style="display:none">

  <header class="admin-topbar">
    <div class="brand">
      <i class="fa-solid fa-building-columns"></i>
      <strong> VILLA CASH</strong>
      <span style="font-size:.8rem;opacity:.75;margin-left:.4rem">Admin</span>
    </div>
    <button class="btn btn-danger" style="padding:.4rem .9rem;font-size:.8rem" onclick="adminLogout()">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </header>

  <main class="admin-body">

    <section class="admin-section">
      <h2><i class="fa-solid fa-arrow-down-to-bracket"></i> Pending Deposits</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Date</th><th>User ID</th><th>Amount</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="depositsBody">
            <tr class="empty-row"><td colspan="5">Loading&#8230;</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section">
      <h2><i class="fa-solid fa-arrow-up-from-bracket"></i> Pending Withdrawals</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Date</th><th>User ID</th><th>Phone</th><th>Amount</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="withdrawalsBody">
            <tr class="empty-row"><td colspan="6">Loading&#8230;</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section">
      <h2><i class="fa-solid fa-gift"></i> Gift Codes</h2>
      <div style="background:#fff;border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;gap:0.8rem;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:130px">
          <label style="display:block;font-size:0.78rem;font-weight:600;margin-bottom:0.3rem">Amount (KES)</label>
          <input type="number" id="giftAmount" placeholder="e.g. 100" min="1"
            style="width:100%;box-sizing:border-box;padding:0.55rem;border:1.5px solid #e2e8f0;border-radius:8px"/>
        </div>
        <div style="flex:1;min-width:130px">
          <label style="display:block;font-size:0.78rem;font-weight:600;margin-bottom:0.3rem">Valid For</label>
          <div style="display:flex;gap:0.4rem">
            <input type="number" id="giftDuration" placeholder="e.g. 24" min="1"
              style="flex:1;min-width:60px;box-sizing:border-box;padding:0.55rem;border:1.5px solid #e2e8f0;border-radius:8px"/>
            <select id="giftDurationUnit" style="padding:0.55rem;border:1.5px solid #e2e8f0;border-radius:8px">
              <option value="1">Hours</option>
              <option value="24">Days</option>
            </select>
          </div>
        </div>
        <div style="flex:1;min-width:130px">
          <label style="display:block;font-size:0.78rem;font-weight:600;margin-bottom:0.3rem">Max Uses (0 = unlimited)</label>
          <input type="number" id="giftMaxUses" placeholder="0" min="0" value="0"
            style="width:100%;box-sizing:border-box;padding:0.55rem;border:1.5px solid #e2e8f0;border-radius:8px"/>
        </div>
        <button class="btn btn-success" style="padding:0.6rem 1.2rem" onclick="createGiftCode()" id="createGiftBtn">
          <i class="fa-solid fa-plus"></i> Create Code
        </button>
      </div>
      <p id="giftCreateMsg" style="font-weight:600;font-size:0.88rem;margin:0 0 0.8rem"></p>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Code</th><th>Amount</th><th>Uses</th><th>Created</th><th>Expires</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="giftCodesBody">
            <tr class="empty-row"><td colspan="7">Loading&#8230;</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-section">
      <h2><i class="fa-solid fa-users"></i> Registered Users</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Phone</th><th>Wallet (KES)</th></tr>
          </thead>
          <tbody id="usersBody">
            <tr class="empty-row"><td colspan="4">Loading&#8230;</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
</div>

<script>
  // helpers
  function esc(v) {
    return String(v == null ? '' : v)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(v) {
    if (!v) return '—';
    var d = new Date(v);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('en-KE', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
  }
  function getToken() { return sessionStorage.getItem('adminToken') || ''; }
  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
  }

  // on load
  window.addEventListener('DOMContentLoaded', function() {
    if (getToken()) showDashboard();
    document.getElementById('adminPass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') adminLogin();
    });
    document.getElementById('adminUser').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('adminPass').focus();
    });
  });

  // toggle password visibility
  function togglePw() {
    var inp = document.getElementById('adminPass');
    var eye = document.getElementById('pwEye');
    if (inp.type === 'password') {
      inp.type = 'text';
      eye.className = 'fa-solid fa-eye-slash';
    } else {
      inp.type = 'password';
      eye.className = 'fa-solid fa-eye';
    }
  }

  // login
  async function adminLogin() {
    var username = document.getElementById('adminUser').value.trim();
    var password = document.getElementById('adminPass').value;
    var errEl = document.getElementById('loginError');
    var btn = document.getElementById('loginBtn');

    errEl.textContent = '';
    if (!username || !password) {
      errEl.textContent = 'Please enter both username and password.';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in&hellip;';

    try {
      var res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });
      var data = await res.json();

      if (res.ok && data.success) {
        sessionStorage.setItem('adminToken', data.token);
        showDashboard();
      } else {
        errEl.textContent = data.message || 'Invalid credentials.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
      }
    } catch (e) {
      errEl.textContent = 'Network error. Please try again.';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
    }
  }

  // logout
  function adminLogout() {
    sessionStorage.removeItem('adminToken');
    document.getElementById('dashboardScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminUser').value = '';
    document.getElementById('adminPass').value = '';
    document.getElementById('loginError').textContent = '';
  }

  // show dashboard
  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    loadDashboard();
  }

  // load data
  async function loadDashboard() {
    try {
      var res = await fetch('/api/admin/dashboard', { headers: authHeaders() });
      if (res.status === 401) { adminLogout(); return; }
      var data = await res.json();
      renderDeposits(data.pendingDeposits || []);
      renderWithdrawals(data.pendingWithdrawals || []);
      renderUsers(data.users || []);
      loadGiftCodes();
    } catch (e) {
      console.error('Dashboard load failed', e);
    }
  }

  // ── Gift codes ──────────────────────────────────────────────────────
  async function loadGiftCodes() {
    var tbody = document.getElementById('giftCodesBody');
    try {
      var res = await fetch('/api/admin/gift-codes', { headers: authHeaders() });
      if (res.status === 401) { adminLogout(); return; }
      var data = await res.json();
      var rows = data.codes || [];

      if (!rows.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No gift codes created yet</td></tr>';
        return;
      }

      var html = '';
      rows.forEach(function(g) {
        var status, badge;
        if (g.expired) { status = 'expired'; badge = 'rejected'; }
        else if (g.fullyUsed) { status = 'fully used'; badge = 'pending'; }
        else { status = 'active'; badge = 'approved'; }

        html += '<tr>' +
          '<td style="font-weight:700;letter-spacing:1px">' + esc(g.code) + '</td>' +
          '<td class="amount">KES ' + (g.amount || 0).toLocaleString() + '</td>' +
          '<td>' + g.uses + (g.maxUses > 0 ? ' / ' + g.maxUses : ' / ∞') + '</td>' +
          '<td>' + fmtDate(g.createdAt) + '</td>' +
          '<td>' + fmtDate(g.expiresAt) + '</td>' +
          '<td><span class="badge badge-' + badge + '">' + status + '</span></td>' +
          '<td><button class="btn btn-primary" style="padding:.3rem .7rem;font-size:.75rem" onclick="copyGiftCode(\'' + esc(g.code) + '\')"><i class="fa-regular fa-copy"></i> Copy</button></td>' +
        '</tr>';
      });
      tbody.innerHTML = html;
    } catch (e) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Failed to load gift codes</td></tr>';
    }
  }

  async function createGiftCode() {
    var amount = Number(document.getElementById('giftAmount').value);
    var duration = Number(document.getElementById('giftDuration').value);
    var unit = Number(document.getElementById('giftDurationUnit').value);
    var maxUses = Number(document.getElementById('giftMaxUses').value) || 0;
    var msgEl = document.getElementById('giftCreateMsg');
    var btn = document.getElementById('createGiftBtn');

    msgEl.textContent = '';
    if (!amount || amount < 1) { msgEl.textContent = 'Enter a valid amount.'; msgEl.style.color = '#dc2626'; return; }
    if (!duration || duration < 1) { msgEl.textContent = 'Enter a valid duration.'; msgEl.style.color = '#dc2626'; return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating…';

    try {
      var res = await fetch('/api/admin/gift-codes', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ amount: amount, validHours: duration * unit, maxUses: maxUses })
      });
      var data = await res.json();

      if (res.ok && data.success && data.gift) {
        msgEl.innerHTML = '✅ Code created: <strong style="letter-spacing:1px">' + esc(data.gift.code) +
          '</strong> (KES ' + data.gift.amount + ', expires ' + fmtDate(data.gift.expiresAt) + ') — copy and send it to your users.';
        msgEl.style.color = '#16a34a';
        document.getElementById('giftAmount').value = '';
        document.getElementById('giftDuration').value = '';
        document.getElementById('giftMaxUses').value = '0';
        loadGiftCodes();
      } else {
        msgEl.textContent = data.message || 'Failed to create gift code.';
        msgEl.style.color = '#dc2626';
      }
    } catch (e) {
      msgEl.textContent = 'Network error. Please try again.';
      msgEl.style.color = '#dc2626';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-plus"></i> Create Code';
    }
  }

  function copyGiftCode(code) {
    navigator.clipboard.writeText(code)
      .then(function() { alert('Gift code copied: ' + code); })
      .catch(function() { alert('Copy manually: ' + code); });
  }

  // render deposits
  function renderDeposits(rows) {
    var tbody = document.getElementById('depositsBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No pending deposits</td></tr>';
      return;
    }
    var html = '';
    rows.forEach(function(d) {
      var dateStr = fmtDate(d.date || d.createdAt);
      var who = d.user && d.user.fullName
        ? esc(d.user.fullName) + '<br><small style="opacity:.7">' + esc(d.user.phone || '') + '</small>'
        : esc(d.user && d.user._id ? d.user._id : (d.user || '-'));
      var approveBtn = d.status === 'pending'
        ? '<button class="btn btn-success" style="padding:.35rem .75rem;font-size:.78rem" onclick="approveDeposit(\'' + esc(d._id) + '\')"><i class="fa-solid fa-check"></i> Approve</button>'
        : '';
      html += '<tr><td>' + dateStr + '</td><td>' + who + '</td>' +
              '<td class="amount">KES ' + (d.amount || 0).toLocaleString() +
              (d.message ? '<br><small style="opacity:.65;font-weight:400;white-space:normal">' + esc(d.message) + '</small>' : '') + '</td>' +
              '<td><span class="badge badge-' + esc(d.status) + '">' + esc(d.status) + '</span></td>' +
              '<td><div class="action-btns">' + approveBtn + '</div></td></tr>';
    });
    tbody.innerHTML = html;
  }

  // render withdrawals
  function renderWithdrawals(rows) {
    var tbody = document.getElementById('withdrawalsBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No pending withdrawals</td></tr>';
      return;
    }
    var html = '';
    rows.forEach(function(w) {
      var dateStr = fmtDate(w.date || w.createdAt);
      var who = w.user && w.user.fullName
        ? esc(w.user.fullName)
        : esc(w.user && w.user._id ? w.user._id : (w.user || '-'));
      var btns = '';
      if (w.status === 'pending') {
        btns = '<button class="btn btn-success" style="padding:.35rem .75rem;font-size:.78rem" onclick="approveWithdrawal(\'' + esc(w._id) + '\')"><i class="fa-solid fa-check"></i> Approve</button>' +
               '<button class="btn btn-danger" style="padding:.35rem .75rem;font-size:.78rem;margin-left:.4rem" onclick="rejectWithdrawal(\'' + esc(w._id) + '\')"><i class="fa-solid fa-xmark"></i> Reject</button>';
      }
      html += '<tr><td>' + dateStr + '</td><td>' + who + '</td>' +
              '<td>' + esc(w.mpesaNumber || '-') + '</td>' +
              '<td class="amount">KES ' + (w.amount || 0).toLocaleString() + '</td>' +
              '<td><span class="badge badge-' + esc(w.status) + '">' + esc(w.status) + '</span></td>' +
              '<td><div class="action-btns">' + btns + '</div></td></tr>';
    });
    tbody.innerHTML = html;
  }

  // render users
  function renderUsers(rows) {
    var tbody = document.getElementById('usersBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No users found</td></tr>';
      return;
    }
    var html = '';
    rows.forEach(function(u) {
      html += '<tr><td>' + esc(u.fullName || '-') + '</td>' +
              '<td>' + esc(u.email || '-') + '</td>' +
              '<td>' + esc(u.phone || '-') + '</td>' +
              '<td class="amount">KES ' + (u.wallet || 0).toLocaleString() + '</td></tr>';
    });
    tbody.innerHTML = html;
  }

  // actions
  async function approveDeposit(id) {
    if (!confirm('Approve this deposit?')) return;
    var res = await fetch('/api/admin/approve-deposit/' + id, { method: 'POST', headers: authHeaders() });
    if (res.ok) { loadDashboard(); } else { alert((await res.json()).message || 'Error'); }
  }

  async function approveWithdrawal(id) {
    if (!confirm('Approve this withdrawal?')) return;
    var res = await fetch('/api/admin/approve-withdrawal/' + id, { method: 'POST', headers: authHeaders() });
    if (res.ok) { loadDashboard(); } else { alert((await res.json()).message || 'Error'); }
  }

  async function rejectWithdrawal(id) {
    if (!confirm('Reject this withdrawal?')) return;
    var res = await fetch('/api/admin/reject-withdrawal/' + id, { method: 'POST', headers: authHeaders() });
    if (res.ok) { loadDashboard(); } else { alert((await res.json()).message || 'Error'); }
  }
</script>
</body>
</html>
