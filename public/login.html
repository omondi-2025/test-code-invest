<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="api.js?v=9"></script>
  <script>VillaAuth.guardGuestOnly();</script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="logo">
        <h1>VILLA <span>CASH</span></h1>
        <p>Smart Investments, Real Returns</p>
      </div>

      <h2>Welcome Back</h2>

      <form id="loginForm" novalidate>
        <div class="field">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="email" placeholder="Email address" autocomplete="email" required />
        </div>

        <div class="field">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        </div>

        <div class="remember-row">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember me on this device</label>
        </div>

        <div class="msg" id="loginMessage"></div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
      </form>

      <div class="switch-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>

    </div>
  </div>

  <script>
    // Restore saved email + remember-me preference
    document.addEventListener("DOMContentLoaded", function() {
      VillaAuth.applyLoginPrefs();
    });

    const form     = document.getElementById("loginForm");
    const msgEl    = document.getElementById("loginMessage");
    const loginBtn = document.getElementById("loginBtn");

    function setMsg(text, color) { msgEl.textContent = text; msgEl.style.color = color; }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email      = document.getElementById("email").value.trim();
      const password   = document.getElementById("password").value;
      const rememberMe = document.getElementById("rememberMe").checked;

      if (!email || !password) { setMsg("Please fill in all fields.", "#EF4444"); return; }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in…';
      setMsg("", "");

      try {
        const res  = await fetch("/api/user/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success && data.user && data.token) {
          setMsg("Login successful! Loading your account…", "#10B981");
          VillaAuth.save(data.token, data.user, rememberMe);
          try {
            if (typeof VillaAuth.syncProfile === "function") {
              await VillaAuth.syncProfile();
            } else {
              const me = await fetch("/api/user/me", {
                headers: { Authorization: "Bearer " + data.token },
              });
              const meData = await me.json();
              if (meData.success && meData.user && typeof VillaAuth.cacheUser === "function") {
                VillaAuth.cacheUser(meData.user);
              }
            }
          } catch (_) {}
          window.location.href = "index.html";
        } else {
          setMsg(data.message || "Invalid email or password.", "#EF4444");
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
        }
      } catch(err) {
        setMsg("Server error. Please try again.", "#EF4444");
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
      }
    });
  </script>
</body>
</html>
