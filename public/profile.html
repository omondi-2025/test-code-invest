<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1E3A5F"/>
  <title>Villa Cash | Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="manifest" href="manifest.webmanifest"/>
  <script src="api.js"></script>
  <script>VillaAuth.guard();</script>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">Profile</span>
    <span></span>
  </header>

  <div class="container profile-container">

    <div class="card profile-summary-card">
      <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
      <div class="profile-display-name" id="displayName">—</div>
      <div class="profile-display-email" id="displayEmail">—</div>
    </div>

    <div class="card">
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-user"></i> Full Name</div>
        <div class="value" id="fullName">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-regular fa-envelope"></i> Email</div>
        <div class="value" id="email">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-phone"></i> Phone</div>
        <div class="value" id="userPhone">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-tag"></i> Referral Code</div>
        <div class="value" id="referralCode">—</div>
      </div>
    </div>

    <div class="card">
      <div class="referral-title">Your Referral Link</div>
      <div class="referral-link-box" id="referralLink"></div>
      <button class="btn btn-primary btn-block" onclick="copyReferral()">
        <i class="fa-regular fa-copy"></i> Copy Referral Link
      </button>
    </div>

    <div class="card app-download-card">
      <div class="section-title profile-section-title">Mobile App</div>
      <p class="app-download-text">Install Villa Cash on your phone for faster access from your home screen.</p>
      <button class="btn btn-accent btn-block" id="installAppBtn" type="button" onclick="installApp()">
        <i class="fa-solid fa-download"></i> Download App
      </button>
      <p id="installHint" class="install-hint"></p>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html" class="active"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script src="pwa.js"></script>
  <script>
    const user = VillaAuth.getUser();

    document.getElementById("displayName").textContent = user.fullName || "—";
    document.getElementById("displayEmail").textContent = user.email || "—";
    document.getElementById("fullName").textContent     = user.fullName || "—";
    document.getElementById("email").textContent        = user.email || "—";
    document.getElementById("userPhone").textContent    = user.phone || "N/A";
    document.getElementById("referralCode").textContent = user.refCode || "N/A";

    const link = window.location.origin + "/signup.html?ref=" + (user.refCode || "");
    document.getElementById("referralLink").textContent = link;

    function copyReferral() {
      navigator.clipboard.writeText(link)
        .then(() => alert("Referral link copied!"))
        .catch(() => alert("Copy manually: " + link));
    }

    const installBtn = document.getElementById("installAppBtn");
    const installHint = document.getElementById("installHint");

    function isIOS() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function setInstallHint(msg) {
      installHint.textContent = msg;
    }

    function refreshInstallState() {
      if (isStandaloneMode()) {
        installBtn.disabled = true;
        installBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> App Installed';
        setInstallHint("Villa Cash is already installed on this device.");
        return;
      }

      if (window.__villaDeferredPrompt) {
        installBtn.disabled = false;
        installBtn.innerHTML = '<i class="fa-solid fa-download"></i> Download App';
        setInstallHint("Tap Download App to install.");
        return;
      }

      if (isIOS()) {
        setInstallHint("On iPhone: tap Share, then Add to Home Screen.");
      } else {
        setInstallHint("Install option will appear once your browser allows it.");
      }
    }

    async function installApp() {
      if (isStandaloneMode()) {
        setInstallHint("Villa Cash is already installed.");
        return;
      }

      const promptEvent = window.__villaDeferredPrompt;
      if (promptEvent) {
        promptEvent.prompt();
        const result = await promptEvent.userChoice;
        if (result && result.outcome === "accepted") {
          setInstallHint("Install request accepted. Finishing setup...");
        } else {
          setInstallHint("Install cancelled. You can try again anytime.");
        }
        window.__villaDeferredPrompt = null;
        refreshInstallState();
        return;
      }

      if (isIOS()) {
        setInstallHint("On iPhone: tap Share, then Add to Home Screen.");
      } else {
        setInstallHint("Install prompt not available yet. Keep browsing and try again.");
      }
    }

    window.addEventListener("villa-install-available", refreshInstallState);
    window.addEventListener("villa-app-installed", refreshInstallState);
    window.addEventListener("DOMContentLoaded", refreshInstallState);
  </script>
</body>
</html>
