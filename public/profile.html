<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #fff; margin: 0 auto 0.8rem;
    }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--muted); font-size: 0.8rem; }
    .info-row .value { font-weight: 600; color: var(--text); }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">Profile</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:1rem;">

    <div class="card" style="text-align:center;margin-bottom:1rem;">
      <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
      <div style="font-size:1.2rem;font-weight:800" id="displayName">—</div>
      <div style="font-size:0.85rem;color:var(--muted)" id="displayEmail">—</div>
    </div>

    <div class="card">
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-user"></i> Full Name</div>
        <div class="value" id="fullName">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-regular fa-envelope"></i> Email</div>
        <div class="value" id="email">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-phone"></i> Phone</div>
        <div class="value" id="userPhone">—</div>
      </div>
      <div class="info-row">
        <div class="label"><i class="fa-solid fa-tag"></i> Referral Code</div>
        <div class="value" id="referralCode">—</div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.4rem;font-weight:600">Your Referral Link</div>
      <div style="background:#F1F5F9;border-radius:8px;padding:0.7rem;font-size:0.8rem;word-break:break-all;color:var(--primary);font-weight:700;margin-bottom:0.7rem" id="referralLink"></div>
      <button class="btn btn-primary btn-block" onclick="copyReferral()">
        <i class="fa-regular fa-copy"></i> Copy Referral Link
      </button>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html" class="active"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script>
    let user = null;
    try {
      const raw = localStorage.getItem("user") || sessionStorage.getItem("user");
      user = raw ? JSON.parse(raw) : null;
      if (user && user._id && !user.id) user.id = user._id;
    } catch { localStorage.removeItem("user"); sessionStorage.removeItem("user"); }

    if (!user || !user.id || !user.email) { window.location.href = "login.html"; }

    document.getElementById("displayName").textContent = user.fullName || "—";
    document.getElementById("displayEmail").textContent = user.email || "—";
    document.getElementById("fullName").textContent     = user.fullName || "—";
    document.getElementById("email").textContent        = user.email || "—";
    document.getElementById("userPhone").textContent    = user.phone || "N/A";
    document.getElementById("referralCode").textContent = user.refCode || "N/A";

    const link = window.location.origin + "/signup.html?ref=" + (user.refCode || "");
    document.getElementById("referralLink").textContent = link;

    function copyReferral() {
      navigator.clipboard.writeText(link)
        .then(() => alert("Referral link copied!"))
        .catch(() => alert("Copy manually: " + link));
    }
  </script>
</body>
</html>
