<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Invest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="api.js"></script>
  <script>VillaAuth.guard();</script>
  <style>
    .investment-item {
      background: #F8FAFC;
      border-left: 4px solid var(--primary);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
      font-size: 0.875rem;
    }
    .investment-item.completed { border-left-color: var(--success); }
    .investment-item p { margin: 0.2rem 0; }
    .inv-row { display:flex; justify-content:space-between; align-items:center; margin:0.2rem 0; }
    .inv-label { color:var(--muted); font-size:0.8rem; }
    .inv-value { font-weight:700; font-size:0.875rem; }
    .badge-active { background:#dcfce7; color:#16a34a; border-radius:999px; padding:0.15rem 0.65rem; font-size:0.78rem; font-weight:700; }
    .badge-next { background:#eff6ff; color:#2563eb; border-radius:999px; padding:0.15rem 0.65rem; font-size:0.78rem; font-weight:600; }
    .inv-divider { border:none; border-top:1px solid #e2e8f0; margin:0.5rem 0; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">Invest</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:1rem;">

    <div class="card" style="text-align:center;margin-bottom:1rem;">
      <div style="color:var(--muted);font-size:0.85rem;">Wallet Balance</div>
      <div style="font-size:1.8rem;font-weight:800;color:var(--primary)">
        KES <span id="walletBalance">0.00</span>
      </div>
    </div>

    <p class="section-title">Investment Plans</p>
    <div class="plans-container" id="plansContainer"></div>

    <p class="section-title" style="margin-top:1.5rem">Active Investments</p>
    <div id="activeInvestments" style="color:var(--muted);font-size:0.9rem">Loading...</div>

    <p class="section-title" style="margin-top:1.5rem">Investment History</p>
    <div id="investmentHistory" style="color:var(--muted);font-size:0.9rem">Loading...</div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html" class="active"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script>
    let user = VillaAuth.getUser();

    const walletEl = document.getElementById("walletBalance");
    walletEl.textContent = parseFloat(user.wallet || 0).toFixed(2);

    // Refresh balance from the server (storage can be stale)
    VillaAuth.fetch("/api/deposit/balance")
      .then(r => r.json())
      .then(d => {
        if (d.success && typeof d.wallet === "number") {
          walletEl.textContent = d.wallet.toFixed(2);
          user.wallet = d.wallet;
          VillaAuth.updateUser(user);
        }
      })
      .catch(() => {});

    const plans = [
      { id: 1, amount: 400 },
      { id: 2, amount: 800 },
      { id: 3, amount: 1800 },
      { id: 4, amount: 2800 },
      { id: 5, amount: 3500 },
      { id: 6, amount: 5000 },
      { id: 7, amount: 8500 },
      { id: 8, amount: 15000 },
      { id: 9, amount: 30000 },
    ];

    document.getElementById("plansContainer").innerHTML = plans.map(p => `
      <div class="plan-card" id="plan${p.id}">
        <div style="font-size:1.1rem;font-weight:800;color:var(--primary)">KES ${p.amount.toLocaleString()}</div>
        <div style="font-size:0.8rem;color:var(--muted);margin:0.3rem 0">10% daily return &bull; 100 days</div>
        <div style="font-size:0.85rem;color:var(--success);font-weight:700;margin-bottom:0.6rem">
          <i class="fa-solid fa-coins"></i> Daily: KES ${(p.amount * 0.10).toFixed(2)}
        </div>
        <button class="btn btn-primary" style="width:100%;padding:0.55rem" onclick="invest(${p.id}, ${p.amount}, this)">
          <i class="fa-solid fa-chart-line"></i> Invest
        </button>
      </div>
    `).join("");

    async function invest(planId, amount, buttonEl) {
      if (parseFloat(user.wallet || 0) < amount) {
        alert("❌ Insufficient wallet balance. Please deposit first.");
        return;
      }
      if (!confirm("Invest KES " + amount.toLocaleString() + " for 100 days at 10% daily profit?\n\nKES " + (amount * 0.10).toFixed(2) + " will be added to your wallet every 24 hours.")) return;

      // Disable button to prevent double-click
      const btn = buttonEl || null;
      const originalHTML = btn ? btn.innerHTML : "";
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...'; }

      try {
        const res = await VillaAuth.fetch("/api/invest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ planId })
        });

        let data;
        try { data = await res.json(); } catch { data = {}; }

        if (res.ok && data.success && data.user) {
          alert("✅ Investment successful! KES " + (amount * 0.10).toFixed(2) + " will be credited every 24 hours.");
          user = data.user;
          VillaAuth.updateUser(user);
          walletEl.textContent = parseFloat(user.wallet || 0).toFixed(2);
          loadInvestments();
        } else {
          alert("❌ " + (data.message || `Investment failed (${res.status}). Please try again.`));
        }
      } catch (err) {
        alert("❌ Could not reach server. The server may be waking up — please wait 30 seconds and try again.");
        console.error("Invest error:", err);
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
      }
    }

    async function loadInvestments() {
      try {
        const res  = await VillaAuth.fetch("/api/invest");
        const data = await res.json();
        if (!data.success) throw new Error();
        const investments = data.investments || [];
        const active  = investments.filter(i => i.status === "Active");
        const history = investments.filter(i => i.status !== "Active")
                          .sort((a, b) => new Date(b.endDate) - new Date(a.endDate));

        const activeDiv = document.getElementById("activeInvestments");
        activeDiv.innerHTML = active.length
          ? active.map(i => {
              const amount = Number(i.amount || 0);
              const daily = Number(i.daily || 0);
              const earned = Number(i.earned || 0);
              const now = new Date();
              const endDate = new Date(i.endDate);
              const daysRemaining = Math.max(0, Math.ceil((endDate - now) / (1000 * 60 * 60 * 24)));
              const lastEarned = i.lastEarned ? new Date(i.lastEarned) : new Date(i.startDate);
              const msUntilNext = (lastEarned.getTime() + 24 * 60 * 60 * 1000) - now.getTime();
              let nextLabel;
              if (msUntilNext <= 0) {
                nextLabel = "Due now";
              } else {
                const hLeft = Math.floor(msUntilNext / (1000 * 60 * 60));
                const mLeft = Math.floor((msUntilNext % (1000 * 60 * 60)) / (1000 * 60));
                nextLabel = `in ${hLeft}h ${mLeft}m`;
              }
              return `<div class="investment-item">
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-solid fa-coins"></i> Invested</span>
                  <span class="inv-value">KES ${amount.toLocaleString()}</span>
                </div>
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-solid fa-chart-line"></i> Daily Earning</span>
                  <span class="inv-value" style="color:var(--success)">KES ${daily.toLocaleString()}</span>
                </div>
                <hr class="inv-divider"/>
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-solid fa-sack-dollar"></i> Total Earned</span>
                  <span class="inv-value" style="color:var(--primary)">KES ${earned.toFixed(2)}</span>
                </div>
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-regular fa-calendar-check"></i> Next Earnings</span>
                  <span class="badge-next">${nextLabel}</span>
                </div>
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-regular fa-hourglass-half"></i> Days Remaining</span>
                  <span class="inv-value">${daysRemaining} day${daysRemaining !== 1 ? 's' : ''}</span>
                </div>
                <div class="inv-row">
                  <span class="inv-label"><i class="fa-regular fa-clock"></i> Start Date</span>
                  <span class="inv-value">${new Date(i.startDate).toLocaleString('en-KE', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}</span>
                </div>
                <div class="inv-row" style="margin-top:0.35rem">
                  <span class="inv-label">Status</span>
                  <span class="badge-active"><i class="fa-solid fa-circle" style="font-size:0.5rem;vertical-align:middle"></i> Active</span>
                </div>
              </div>`;
            }).join("")
          : '<p style="color:var(--muted)">No active investments.</p>';

        const histDiv = document.getElementById("investmentHistory");
        histDiv.innerHTML = history.length
          ? history.map(i => `<div class="investment-item completed">
              <p><strong>Amount:</strong> KES ${i.amount} &bull; <strong>Earned:</strong> KES ${i.earned}</p>
              <p><strong>Status:</strong> ${i.status} &bull; <strong>Ended:</strong> ${new Date(i.endDate).toLocaleDateString()}</p>
            </div>`).join("")
          : '<p style="color:var(--muted)">No history yet.</p>';
      } catch (err) {
        console.error("loadInvestments error:", err);
        document.getElementById("activeInvestments").innerHTML = '<p style="color:var(--danger)">⚠️ Failed to load investments. Please refresh.</p>';
        document.getElementById("investmentHistory").innerHTML = '<p style="color:var(--danger)">⚠️ Failed to load history. Please refresh.</p>';
      }
    }

    loadInvestments();

    window.addEventListener("load", () => {
      const id = location.hash.replace("#", "");
      if (id) { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }
    });
  </script>
</body>
</html>
