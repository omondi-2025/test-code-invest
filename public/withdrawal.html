<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Villa Cash | Withdraw</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <span class="brand">Withdraw</span>
    <span></span>
  </header>

  <div class="container" style="padding-top:1rem;">

    <div class="card" style="text-align:center;margin-bottom:1rem;">
      <div style="color:var(--muted);font-size:0.85rem;">Wallet Balance</div>
      <div style="font-size:1.8rem;font-weight:800;color:var(--primary)" id="walletDisplay">
        KES &mdash;
      </div>
    </div>

    <div class="info-banner" style="background:#FFF7ED;border-color:#F59E0B;color:#92400E">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <strong> Please Note:</strong>
      <ul style="margin:0.4rem 0 0 1.1rem;padding:0;font-size:0.875rem;line-height:1.7">
        <li>Minimum withdrawal is <strong>KES 200</strong></li>
        <li>An <strong>18% tax</strong> is deducted from all withdrawals</li>
        <li>Requests accepted <strong>9:00 AM – 5:00 PM</strong> daily (one per day)</li>
      </ul>
    </div>

    <div class="card">
      <label style="display:block;font-weight:600;margin-bottom:0.4rem">
        <i class="fa-solid fa-money-bill-transfer" style="color:var(--primary)"></i> Amount to Withdraw (KES)
      </label>
      <input type="number" id="withdrawAmount" placeholder="Enter amount (min 200)" style="width:100%;box-sizing:border-box"/>
      <p id="taxInfo" style="font-size:0.85rem;color:var(--muted);margin:0.3rem 0 0.8rem"></p>

      <label style="display:block;font-weight:600;margin-bottom:0.4rem">
        <i class="fa-solid fa-phone" style="color:var(--success)"></i> M-PESA Number
      </label>
      <input type="tel" id="mpesaNumber" placeholder="07XXXXXXXX" readonly style="width:100%;box-sizing:border-box;background:#F8FAFC"/>

      <div id="message" style="margin:0.6rem 0;font-weight:600;font-size:0.9rem"></div>

      <button class="btn btn-primary btn-block" id="withdrawBtn" onclick="handleWithdraw()">
        <i class="fa-solid fa-paper-plane"></i> Request Withdrawal
      </button>
    </div>

    <p class="section-title">Withdrawal History</p>
    <div class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
        <thead>
          <tr style="background:var(--primary);color:#fff;">
            <th style="padding:0.75rem 0.6rem;text-align:left">Date</th>
            <th style="padding:0.75rem 0.6rem;text-align:left">Amount</th>
            <th style="padding:0.75rem 0.6rem;text-align:left">Status</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="3" style="text-align:center;padding:1rem;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="deposit.html"><i class="fa-solid fa-circle-down"></i><span>Deposit</span></a>
    <a href="invest.html"><i class="fa-solid fa-chart-line"></i><span>Invest</span></a>
    <a href="withdrawal.html" class="active"><i class="fa-solid fa-circle-up"></i><span>Withdraw</span></a>
    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a>
    <a href="agent.html"><i class="fa-solid fa-user-plus"></i><span>Invite</span></a>
    <a href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
  </nav>

  <script src="api.js"></script>
  <script>
    if (!VillaAuth.requireLogin()) throw new Error("redirecting");
    const user = VillaAuth.getUser();

    document.getElementById("mpesaNumber").value = user.phone || "";

    VillaAuth.fetch("/api/deposit/balance")
      .then(r => r.json())
      .then(d => {
        document.getElementById("walletDisplay").textContent = "KES " + (d.wallet || 0).toFixed(2);
      })
      .catch(() => {});

    VillaAuth.fetch("/api/withdraw")
      .then(r => r.json())
      .then(d => {
        const tbody = document.getElementById("historyBody");
        const list  = d.history || [];
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:1rem;color:var(--muted)">No withdrawals yet.</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(w => {
          const color = w.status === "approved" ? "var(--success)" : w.status === "pending" ? "var(--secondary)" : "var(--danger)";
          return '<tr style="border-bottom:1px solid var(--border)">' +
            '<td style="padding:0.6rem">' + new Date(w.date).toLocaleDateString() + '</td>' +
            '<td style="padding:0.6rem">KES ' + w.amount + '</td>' +
            '<td style="padding:0.6rem;color:' + color + ';font-weight:700">' + w.status + '</td>' +
          '</tr>';
        }).join("");
      });

    document.getElementById("withdrawAmount").addEventListener("input", function() {
      const amt = parseFloat(this.value);
      const el  = document.getElementById("taxInfo");
      el.textContent = (!isNaN(amt) && amt > 0)
        ? "After 18% tax, you will receive approx. KES " + (amt * 0.82).toFixed(2)
        : "";
    });

    async function handleWithdraw() {
      const amount = parseFloat(document.getElementById("withdrawAmount").value);
      const phone  = document.getElementById("mpesaNumber").value.trim();
      const msgEl  = document.getElementById("message");
      const btn    = document.getElementById("withdrawBtn");

      if (!amount || amount < 200) {
        msgEl.textContent = "Minimum withdrawal is KES 200.";
        msgEl.style.color = "var(--danger)"; return;
      }
      const formattedPhone = phone.startsWith("0") ? "254" + phone.slice(1) : phone;

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
      msgEl.textContent = "";
      try {
        const result = await VillaAuth.postJSON("/api/withdraw", { amount, phone: formattedPhone });
        if (result.success) {
          msgEl.textContent = "Withdrawal request submitted!";
          msgEl.style.color = "var(--success)";
          setTimeout(() => location.reload(), 1200);
        } else {
          msgEl.textContent = result.message || "Request failed.";
          msgEl.style.color = "var(--danger)";
        }
      } catch {
        msgEl.textContent = "Server error. Please try again.";
        msgEl.style.color = "var(--danger)";
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Request Withdrawal';
      }
    }
  </script>
</body>
</html>
